<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Moderninha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculadora-container">
        <h2>Calculadora em JS</h2>

        <input type="number" name="num1" id="num1" placeholder="Primeiro número">
        <input type="number" name="num2" id="num2" placeholder="Segundo número">

        <div class="botoes-operacao">
            <button id="btn-somar">+</button>
            <button id="btn-subtrair">-</button>
            <button id="btn-multiplicar">x</button>
            <button id="btn-dividir">/</button>
        </div>

        <div class="resultado-box">
            Resultado: <span id="resultado">0</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
